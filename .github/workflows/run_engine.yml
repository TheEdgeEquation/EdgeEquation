name: Run Edge Equation Engine

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

jobs:
  run-engine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run engine
        run: python engine/engine/engine/main.py


      - name: Commit output
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add output/*
          git commit -m "Daily engine output" || echo "No changes"
          git push
