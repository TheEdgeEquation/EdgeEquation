name: Edge Equation — Daily Automation
 
on:
  schedule:
    # EE — 7:30 AM CST (12:30 UTC) announce
    - cron: "30 12 * * *"
    # EE — 10:30 AM CST (15:30 UTC) daily projections + auto-post
    - cron: "30 15 * * *"
    # EE — 11:30 PM CST (4:30 UTC next day) results
    - cron: "30 4 * * *"
    # EE — Sunday 10 AM CST (15:00 UTC) weekly roundup
    - cron: "0 15 * * 0"
    # EE — Monday 7 AM CST (12:00 UTC) weekly reminder
    - cron: "0 12 * * 1"
    # EE — 1st of month 7 AM CST (12:00 UTC) monthly reminder
    - cron: "0 12 1 * *"
    # EE — NBA/NHL playoffs post Thursday before start
    - cron: "0 14 17 4 *"
    # Phase transitions
    - cron: "0 12 13 5 *"
    - cron: "0 12 13 6 *"
    - cron: "0 12 13 7 *"
 
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode to run"
        required: true
        default: "daily"
        type: choice
        options:
          - announce
          - daily
          - results
          - weekly
          - playoffs
          - cbc_announce
          - cbc_kbo
          - cbc_npb
          - cbc_epl
          - cbc_results
          - weekly_reminder
          - monthly_reminder
          - phase2
          - phase3
          - phase4
      dry_run:
        description: "Dry run (no post or email)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
 
jobs:
  run-edge-equation:
    runs-on: ubuntu-latest
    timeout-minutes: 75
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
 
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: Install dependencies
        run: pip install -r requirements.txt
 
      - name: Determine mode from schedule
        run: |
          EVENT="${{ github.event_name }}"
          DRY="${{ github.event.inputs.dry_run }}"
          INPUT_MODE="${{ github.event.inputs.mode }}"
          if [ "$EVENT" = "schedule" ]; then
            echo "DRY_RUN_FLAG=" >> $GITHUB_ENV
            HOUR=$(date -u +"%H")
            MIN=$(date -u +"%M")
            DAY=$(date -u +"%d")
            WEEKDAY=$(date -u +"%u")
            MONTH=$(date -u +"%m")
            if [ "$HOUR" = "12" ] && [ "$MIN" = "30" ] && [ "$WEEKDAY" != "1" ]; then
              echo "RUN_MODE=announce" >> $GITHUB_ENV
            elif [ "$HOUR" = "15" ] && [ "$MIN" = "30" ]; then
              echo "RUN_MODE=daily" >> $GITHUB_ENV
            elif [ "$HOUR" = "04" ] && [ "$MIN" = "30" ]; then
              echo "RUN_MODE=results" >> $GITHUB_ENV
            elif [ "$HOUR" = "15" ] && [ "$MIN" = "00" ] && [ "$WEEKDAY" = "7" ]; then
              echo "RUN_MODE=weekly" >> $GITHUB_ENV
            elif [ "$HOUR" = "12" ] && [ "$MIN" = "00" ] && [ "$WEEKDAY" = "1" ]; then
              echo "RUN_MODE=weekly_reminder" >> $GITHUB_ENV
            elif [ "$HOUR" = "12" ] && [ "$MIN" = "00" ] && [ "$DAY" = "01" ]; then
              echo "RUN_MODE=monthly_reminder" >> $GITHUB_ENV
            elif [ "$HOUR" = "14" ] && [ "$MIN" = "00" ]; then
              echo "RUN_MODE=playoffs" >> $GITHUB_ENV
            elif [ "$MONTH" = "05" ] && [ "$DAY" = "13" ]; then
              echo "RUN_MODE=phase2" >> $GITHUB_ENV
            elif [ "$MONTH" = "06" ] && [ "$DAY" = "13" ]; then
              echo "RUN_MODE=phase3" >> $GITHUB_ENV
            elif [ "$MONTH" = "07" ] && [ "$DAY" = "13" ]; then
              echo "RUN_MODE=phase4" >> $GITHUB_ENV
            else
              echo "RUN_MODE=daily" >> $GITHUB_ENV
            fi
          else
            echo "RUN_MODE=$INPUT_MODE" >> $GITHUB_ENV
            if [ "$DRY" = "true" ]; then
              echo "DRY_RUN_FLAG=--dry-run" >> $GITHUB_ENV
            else
              echo "DRY_RUN_FLAG=" >> $GITHUB_ENV
            fi
          fi
 
      - name: Run EdgeEquation
        env:
          ODDS_API_KEY:        ${{ secrets.ODDS_API_KEY }}
          X_API_KEY:           ${{ secrets.X_API_KEY }}
          X_API_SECRET:        ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:      ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET:     ${{ secrets.X_ACCESS_SECRET }}
          EMAIL_FROM:          ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:            ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD:      ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_SMTP:          ${{ secrets.EMAIL_SMTP }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          FOOTBALL_DATA_KEY:   ${{ secrets.FOOTBALL_DATA_KEY }}
        run: |
          echo "Running mode=$RUN_MODE dry=$DRY_RUN_FLAG"
          python main.py --mode $RUN_MODE $DRY_RUN_FLAG
 
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: output
          path: output/
          if-no-files-found: ignore
