name: Edge Equation — Daily Automation

on:
  schedule:
    - cron: "30 12 * * *"
    - cron: "30 15 * * *"
    - cron: "30 4 * * *"
    - cron: "0 15 * * 0"

  workflow_dispatch:
    inputs:
      mode:
        description: "Mode to run"
        required: true
        default: "daily"
        type: choice
        options:
          - announce
          - daily
          - post
          - results
          - weekly
          - cash_tease
          - cash_drop
          - cash_results
      dry_run:
        description: "Dry run (no X post)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  run-edge-equation:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine mode from schedule
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            echo "DRY_RUN_FLAG=" >> $GITHUB_ENV
          elif [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            echo "DRY_RUN_FLAG=--dry-run" >> $GITHUB_ENV
          else
            echo "DRY_RUN_FLAG=" >> $GITHUB_ENV
          fi
            HOUR=$(date -u +%H)
            MINUTE=$(date -u +%M)
            DOW=$(date -u +%u)
            if [ "$HOUR" = "12" ] && [ "$MINUTE" -lt "45" ]; then
              echo "mode=announce" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "15" ] && [ "$MINUTE" -lt "45" ] && [ "$DOW" != "7" ]; then
              echo "mode=daily" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "15" ] && [ "$DOW" = "7" ]; then
              echo "mode=weekly" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "04" ] && [ "$MINUTE" -lt "45" ]; then
              echo "mode=results" >> $GITHUB_OUTPUT
            else
              echo "mode=daily" >> $GITHUB_OUTPUT
            fi
            echo "dry_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Run EdgeEquation
        env:
          ODDS_API_KEY:        ${{ secrets.ODDS_API_KEY }}
          X_API_KEY:           ${{ secrets.X_API_KEY }}
          X_API_SECRET:        ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:      ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET:     ${{ secrets.X_ACCESS_SECRET }}
          TWILIO_ACCOUNT_SID:  ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:   ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM:         ${{ secrets.TWILIO_FROM }}
          TWILIO_TO:           ${{ secrets.TWILIO_TO }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ steps.mode.outputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python main.py --mode ${{ steps.mode.outputs.mode }} $DRY_RUN_FLAG

      - name: Upload graphic artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ee-graphic-${{ steps.mode.outputs.mode }}-${{ github.run_id }}
          path: output/
          retention-days: 7
