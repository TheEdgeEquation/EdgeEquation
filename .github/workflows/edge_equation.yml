name: Edge  — Daily Automation
 
on:
  :
    # EE — 8:00 AM CST (14:00 UTC) system status
    - cron: "0 14 * * *"
    # EE — 10:30 AM CST (16:30 UTC) GOTD
    - cron: "30 16 * * *"
    # EE — 10:45 AM CST (16:45 UTC) POTD
    - cron: "45 16 * * *"
    # EE — 11:30 AM CST (17:30 UTC) daily projections
    - cron: "30 17 * * *"
    # EE — 11:30 PM CST (05:30 UTC next day) results
    - cron: "30 5 * * *"
    # EE — Sunday 10 AM CST (16:00 UTC) weekly roundup
    - cron: "0 16 * * name: Edge Equation — Daily Automatio

on:
  schedule:
    # EE — 8:00 AM CST (14:00 UTC) system status
    - cron: "0 14 * * *"
    # EE — 10:30 AM CST (16:30 UTC) GOTD
    - cron: "30 16 * * *"
    # EE — 10:45 AM CST (16:45 UTC) POTD
    - cron: "45 16 * * *"
    # EE — 11:30 AM CST (17:30 UTC) daily projections
    - cron: "30 17 * * *"
    # EE — 11:30 PM CST (05:30 UTC next day) results
    - cron: "30 5 * * *"
    # EE — Sunday 10 AM CST (16:00 UTC) weekly roundup
    - cron: "0 16 * * 0"
    # EE — Monday 8 AM CST (14:00 UTC) weekly reminder
    - cron: "0 14 * * 1"
    # EE — 1st of month 8 AM CST (14:00 UTC) monthly reminder
    - cron: "0 14 1 * *"
    # EE — NBA/NHL playoffs
    - cron: "0 14 17 4 *"
    # Phase transitions
    - cron: "0 14 13 5 *"
    - cron: "0 14 13 6 *"
    - cron: "0 14 13 7 *"

  workflow_dispatch:
    inputs:
      mode:
        description: "Mode to run"
        required: true
        default: "daily"
        type: choice
        options:
          - system_status
          - gotd
          - potd
          - announce
          - daily
          - results
          - weekly
          - playoffs
          - cbc_announce
          - cbc_kbo
          - cbc_npb
          - cbc_epl
          - cbc_results
          - cbc_gotd
          - cbc_potd
          - scan_game
          - scan_prop
          - scan_nrfi
          - weekly_reminder
          - monthly_reminder
          - phase2
          - phase3
          - phase4
      dry_run:
        description: "Dry run (no post or email)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  run-edge-equation:
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ============================================================
      # DRIFT-PROOF MODE SELECTOR (REPLACES OLD WINDOW LOGIC)
      # ============================================================
      - name: Determine mode from schedule
        run: |
          EVENT="${{ github.event_name }}"
          CRON_STRING="${{ github.event.schedule }}"
          INPUT_MODE="${{ github.event.inputs.mode }}"
          DRY="${{ github.event.inputs.dry_run }}"

          echo "DRY_RUN_FLAG=" >> $GITHUB_ENV

          if [ "$EVENT" = "schedule" ]; then
            echo "Triggered by schedule: $CRON_STRING"

            case "$CRON_STRING" in
              "0 14 * * *")
                echo "RUN_MODE=system_status" >> $GITHUB_ENV
                ;;
              "30 16 * * *")
                echo "RUN_MODE=gotd" >> $GITHUB_ENV
                ;;
              "45 16 * * *")
                echo "RUN_MODE=potd" >> $GITHUB_ENV
                ;;
              "30 17 * * *")
                echo "RUN_MODE=daily" >> $GITHUB_ENV
                ;;
              "30 5 * * *")
                echo "RUN_MODE=results" >> $GITHUB_ENV
                ;;
              "0 16 * * 0")
                echo "RUN_MODE=weekly" >> $GITHUB_ENV
                ;;
              "0 14 * * 1")
                echo "RUN_MODE=weekly_reminder" >> $GITHUB_ENV
                ;;
              "0 14 1 * *")
                echo "RUN_MODE=monthly_reminder" >> $GITHUB_ENV
                ;;
              "0 14 17 4 *")
                echo "RUN_MODE=playoffs" >> $GITHUB_ENV
                ;;
              "0 14 13 5 *")
                echo "RUN_MODE=phase2" >> $GITHUB_ENV
                ;;
              "0 14 13 6 *")
                echo "RUN_MODE=phase3" >> $GITHUB_ENV
                ;;
              "0 14 13 7 *")
                echo "RUN_MODE=phase4" >> $GITHUB_ENV
                ;;
              *)
                echo "RUN_MODE=daily" >> $GITHUB_ENV
                ;;
            esac

          else
            echo "RUN_MODE=$INPUT_MODE" >> $GITHUB_ENV
            if [ "$DRY" = "true" ]; then
              echo "DRY_RUN_FLAG=--dry-run" >> $GITHUB_ENV
            else
              echo "DRY_RUN_FLAG=" >> $GITHUB_ENV
            fi
          fi

      - name: Run EdgeEquation
        env:
          ODDS_API_KEY:        ${{ secrets.ODDS_API_KEY }}
          MMA_API_KEY:         ${{ secrets.MMA_API_KEY }}
          X_API_KEY:           ${{ secrets.X_API_KEY }}
          X_API_SECRET:        ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:      ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET:     ${{ secrets.X_ACCESS_SECRET }}
          EMAIL_FROM:          ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:            ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD:      ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_SMTP:          ${{ secrets.EMAIL_SMTP }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          FOOTBALL_DATA_KEY:   ${{ secrets.FOOTBALL_DATA_KEY }}
        run: |
          echo "Running mode=$RUN_MODE dry=$DRY_RUN_FLAG"
          python main.py --mode $RUN_MODE $DRY_RUN_FLAG

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: output-${{ github.run_number }}
          path: output/
          if-no-files-found: ignore
