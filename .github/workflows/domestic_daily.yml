name: Edge Equation — Domestic Daily Automation

on:
  schedule:
    # 7:30 AM CT — CTA (12:30 UTC)
    - cron: "30 12 * * *"
    # 11:00 AM CT — Slate Overview (16:00 UTC)
    - cron: "0 16 * * *"
    # 11:15 AM CT — POTD (16:15 UTC)
    - cron: "15 16 * * *"
    # 11:30 AM CT — GOTD (16:30 UTC)
    - cron: "30 16 * * *"
    # 11:45 AM CT — First Inning POTD (16:45 UTC)
    - cron: "45 16 * * *"
    # 12:00 PM CT — NRFI/YRFI (17:00 UTC)
    - cron: "0 17 * * *"
    # 12:30 PM CT — Props (17:30 UTC)
    - cron: "30 17 * * *"
    # 12:45 PM CT — Manual Hero Email (17:45 UTC)
    - cron: "45 17 * * *"

  workflow_dispatch:

jobs:

  cta_0730:
    if: github.event.schedule == '30 12 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: 7:30 AM CTA
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: python main.py --mode system_status

  slate_1100:
    if: github.event.schedule == '0 16 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: 11:00 AM Slate Overview
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: python main.py --mode daily

  potd_1115:
    if: github.event.schedule == '15 16 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: 11:15 AM POTD
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: python main.py --mode potd

  godt_1130:
    if: github.event.schedule == '30 16 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: 11:30 AM GOTD
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: python main.py --mode godt

  fipod_1145:
    if: github.event.schedule == '45 16 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: 11:45 AM First Inning POTD
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: python main.py --mode first_inning_potd

  nrfi_1200:
    if: github.event.schedule == '0 17 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: 12:00 PM NRFI/YRFI
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: python main.py --mode run_suppression_signal

  props_1230:
    if: github.event.schedule == '30 17 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: 12:30 PM Props
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: python main.py --mode prop_efficiency_signal

  hero_email_1245:
    if: github.event.schedule == '45 17 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: 12:45 PM Hero Email
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_SMTP: ${{ secrets.EMAIL_SMTP }}
        run: python main.py --mode daily_email
