name: Edge Equation Posting Scheduler

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Select the mode to run"
        required: true
        type: choice
        options:
          - fact_domestic
          - edges_morning
          - spotlight
          - edges_evening
          - results

  schedule:
    - cron: "30 12 * * *"
    - cron: "30 15 * * *"
    - cron: "30 20 * * *"
    - cron: "0 23 * * *"
    - cron: "30 2 * * *"

jobs:
  run_mode:
    runs-on: ubuntu-latest

    env:
      X_API_KEY: ${{ secrets.X_API_KEY }}
      X_API_SECRET: ${{ secrets.X_API_SECRET }}
      X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
      X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}

      # ⭐ ADD THIS LINE ⭐
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run selected mode
        run: python main.py --mode "${{ github.event.inputs.mode }}"
